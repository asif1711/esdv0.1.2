                                <input type="text" id="verify_phone" name="phone" placeholder="Phone Number" required>
                                <span class="icon_phone"></span>

                            <div class="input__item">
                                <input type="text" id="verify_code" name="code" placeholder="Access Code" required>
                                <span class="icon_key"></span>

    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>

    <!-- JS: Form Logic -->
    <script>
        document.getElementById("verifyForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const phone = document.getElementById("verify_phone").value;
            const code = document.getElementById("verify_code").value;

            const formData = new FormData();
            formData.append("phone", phone);
            formData.append("code", code);

            fetch("/esd/verify-code.php", {
                method: "POST",
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                const msg = document.getElementById("verifyMessage");
                msg.textContent = data.message;
                msg.style.color = data.message.toLowerCase().includes("success") ? "green" : "red";
            })
            .catch(err => console.error("Error:", err));
        });

        // Set background image if needed (like breadcrumb)
        document.querySelectorAll('.set-bg').forEach(el => {
            const bg = el.getAttribute('data-setbg');
            if (bg) el.style.backgroundImage = `url(${bg})`;
        });
    </script>
